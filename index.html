<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traveller Lifepath</title>
    <!-- GoatCounter analytics. Privacy-friendly, no cookies. https://www.goatcounter.com
         no_onload disables the script's automatic pageview so AnalyticsRouteTracker can
         own counting (the app uses HashRouter and would otherwise lose every route change). -->
    <script>
      window.goatcounter = { no_onload: true };
    </script>
    <script
      data-goatcounter="https://traveller-lifepath.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
