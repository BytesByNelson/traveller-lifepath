<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Tell browsers (and any honest intermediate cache) not to reuse this HTML without
      revalidating with the server. Vite's hashed asset filenames are content-addressed
      so the JS/CSS chunks can be cached forever, but the entry HTML MUST be fresh on
      every load — otherwise a tab opened before a deploy keeps referencing chunk hashes
      that GitHub Pages no longer serves, and lazy imports fail mid-session.

      GitHub Pages doesn't expose HTTP cache-control headers we can customise from the
      repo, so these meta equivalents plus the in-app stale-chunk auto-reload (see
      router.tsx) are our defence in depth.
    -->
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <title>Traveller Lifepath</title>
    <!--
      Theme bootstrap — runs synchronously before React mounts. If the user
      previously picked the Imperial (dark) theme (or 'system' on a dark OS),
      apply the .dark class up-front so the page doesn't flash light first.
      Default is LBB (light); doing nothing leaves <html> without the class.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('traveller:theme');
          var dark =
            t === 'imperial' ||
            (t === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* noop */
        }
      })();
    </script>
    <!-- GoatCounter analytics. Privacy-friendly, no cookies. https://www.goatcounter.com
         no_onload disables the script's automatic pageview so AnalyticsRouteTracker can
         own counting (the app uses HashRouter and would otherwise lose every route change). -->
    <script>
      window.goatcounter = { no_onload: true };
    </script>
    <script
      data-goatcounter="https://traveller-lifepath.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
